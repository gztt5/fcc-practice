<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blog-post-card">
        <img class="post-img" src="https://i.pinimg.com/736x/c7/c4/8d/c7c48d7ede98ff4a264ae8520142dc43.jpg" alt="post image"/>
        <div class="post-content">
            <h2 class="post-title">Discover my music taste</h2>
            <p class="post-excerpt">SAMPLE TEXT. Click the button down below and check my music taste.</p>
            <a class="read-more">Read More</a>
    </div>
</body>
</html>
