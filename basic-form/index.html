<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Job Application Form</h1>
        <form>
            <label for="name" id="name">Full Name: </label>
            <input required type="text" id="name" placeholder="Enter your name"/>

            <label for="email" id="email">Email: </label>
            <input required type="email" id="email" placeholder="Enter your email" />

            <label for="position" id="position">Position: </label>
            <select required id="position" name="position">
                <option selected disabled value="">Choose an option</option>
                <option value="developer">Developer</option>
                <option value="designer">Designer</option>
                <option value="manager">Manager</option>
                <option value="sunset-seeker" title="Go find that horizon!">Sunset Seeker</option>
            </select>
            

            <fieldset class="radio-group">
                <legend>Availability: </legend>

                <input checked type="radio" id="full-time" name="availability" value="full-time">
                <label for="full-time">Full-Time</label>

                <input type="radio" id="part-time" name="availability" value="part-time">
                <label for="part-time">Part-Time</label>
            </fieldset>

            <label for="message">Why do you want this j*b?</label>
            <textarea required id="message" placeholder="This form may be awful, but I made it without AI!" rows="5" cols="80"></textarea>

            <button type="submit" id="submit-btn">Submit your form</button>
        </form>
    </div>

</body>
</html>
